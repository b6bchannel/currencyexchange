<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Currency</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Currency">
    
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <style>
        :root {
            --bg: #E0E5EC;
            --input-bg: #D5DFEB; 
            --text-dark: #4D5E7C;
            --text-light: #9BAAC6;
            --shadow-light: rgba(255,255,255, 0.9);
            --shadow-dark: rgba(163,177,198, 0.6);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
            /* 核心修复 1：彻底切断 iOS 系统级的横向回弹和侧滑干预 */
            overflow-x: hidden;
            overscroll-behavior-x: none;
        }
        header {
            padding: 30px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-dark);
        }
        
        .header-actions { display: flex; gap: 15px; }
        .icon-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--bg); border: none;
            color: var(--text-dark); font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            cursor: pointer; transition: all 0.2s ease;
        }
        .icon-btn:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        .cards-container {
            flex: 1;
            overflow-y: auto;
            /* 核心修复 2：锁死容器自身的横向滚动条 */
            overflow-x: hidden; 
            padding: 30px 20px 60px;
            margin: -20px 0; 
            scrollbar-width: none;
        }
        .cards-container::-webkit-scrollbar { display: none; }
        
        .swipe-wrapper {
            position: relative; margin-bottom: 28px; border-radius: 20px;
            transition: transform 0.1s;
            /* 核心修复 3：通知浏览器该元素只允许原生上下滚动，左右滑动全权由 JS 动画接管 */
            touch-action: pan-y; 
        }

        .actions-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg); border-radius: 20px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1;
        }
        .action-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none; 
            background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .action-btn.add { color: #34c759; }
        .action-btn.del { color: #ff3b30; }
        .action-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        .card-content {
            background: var(--bg); border-radius: 20px; padding: 22px 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            display: flex; align-items: center; position: relative; z-index: 2; width: 100%;
        }
        
        .currency-info { display: flex; flex-direction: column; width: 105px; }
        .currency-label { font-size: 22px; font-weight: 800; color: var(--text-dark); }
        .currency-time {
            font-size: 11px; font-weight: 600; color: var(--text-light);
            margin-top: 6px; letter-spacing: 0.2px; white-space: nowrap;
        }

        .input-wrapper {
            flex: 1; margin-left: 10px; border-radius: 12px;
            background-color: var(--input-bg);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            padding: 12px 15px;
        }
        input[type="number"] {
            width: 100%; border: none; background: transparent;
            font-size: 24px; font-weight: 700; color: var(--text-dark);
            text-align: right; outline: none;
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(224, 229, 236, 0.85); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .modal-card {
            background: var(--bg); border-radius: 24px; padding: 25px;
            width: 85%; max-width: 380px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }
        
        .modal-card select {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--bg); color: var(--text-dark);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            font-size: 18px; outline: none; margin-bottom: 25px; appearance: none;
        }
        .modal-btns { display: flex; justify-content: space-between; }
        .modal-btns button {
            flex: 1; padding: 14px; border-radius: 12px; border: none; background: var(--bg);
            font-size: 16px; font-weight: bold; color: var(--text-dark);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            margin: 0 8px; cursor: pointer;
        }
        .modal-btns button:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        .sort-list-container {
            max-height: 50vh; overflow-y: auto; margin-bottom: 20px; padding: 10px 5px; scrollbar-width: none;
        }
        .sort-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; margin-bottom: 15px; background: var(--bg); border-radius: 16px;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }
        .sort-item-label { font-size: 18px; font-weight: 700; color: var(--text-dark); }
        .sort-controls button {
            background: none; border: none; font-size: 22px; color: var(--text-dark);
            padding: 0 10px; cursor: pointer;
        }
        .sort-controls button:active { opacity: 0.5; }

        .footer-info { text-align: center; padding-bottom: 20px; }
        .status { font-size: 11px; color: var(--text-light); margin-bottom: 6px; }
        .meta-info { font-size: 10px; color: var(--text-light); opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <h1>Currency</h1>
        <div class="header-actions">
            <button class="icon-btn" onclick="openSort()">⇅</button>
            <button class="icon-btn" onclick="openPicker()">+</button>
        </div>
    </header>
    
    <div class="cards-container" id="cards"></div>
    
    <div class="footer-info">
        <div class="status" id="status-text">左滑添加 · 右滑删除</div>
        <div class="meta-info" id="meta-info">正在获取最新汇率数据...</div>
    </div>

    <div class="overlay" id="picker-overlay">
        <div class="modal-card">
            <select id="currency-select"></select>
            <div class="modal-btns">
                <button onclick="closeModal('picker-overlay')">取消</button>
                <button onclick="addCurrency()" style="color: #34c759;">添加</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="sort-overlay">
        <div class="modal-card">
            <div class="sort-list-container" id="sort-list"></div>
            <div class="modal-btns">
                <button onclick="closeModal('sort-overlay')" style="color: #007aff; width: 100%;">完成</button>
            </div>
        </div>
    </div>

    <script>
        let rates = {};
        let activeCards = ['CNY', 'USD', 'EUR', 'AUD']; 
        let baseUSDValue = 0; 
        
        const allCurrencies = {
            'CNY': '人民币', 'USD': '美元', 'EUR': '欧元', 'JPY': '日元', 
            'GBP': '英镑', 'HKD': '港币', 'TWD': '新台币', 'SGD': '新加坡元',
            'AUD': '澳元', 'CAD': '加币', 'VND': '越南盾', 'THB': '泰铢', 
            'KRW': '韩元', 'PLN': '波兰币', 'CHF': '瑞士法郎', 'NZD': '新西兰元'
        };

        const timeZoneMap = {
            'CNY': 'Asia/Shanghai', 'USD': 'America/New_York', 'EUR': 'Europe/Berlin',
            'JPY': 'Asia/Tokyo', 'GBP': 'Europe/London', 'HKD': 'Asia/Hong_Kong',
            'TWD': 'Asia/Taipei', 'SGD': 'Asia/Singapore', 'AUD': 'Australia/Sydney',
            'CAD': 'America/Toronto', 'VND': 'Asia/Ho_Chi_Minh', 'THB': 'Asia/Bangkok',
            'KRW': 'Asia/Seoul', 'PLN': 'Europe/Warsaw', 'CHF': 'Europe/Zurich', 
            'NZD': 'Pacific/Auckland'
        };

        function getLocalTime(currency) {
            const tz = timeZoneMap[currency];
            if (!tz) return '--:--';
            try {
                const formatter = new Intl.DateTimeFormat('en-US', { 
                    timeZone: tz, hour: '2-digit', minute: '2-digit', 
                    hour12: true, timeZoneName: 'shortOffset'
                });
                return formatter.format(new Date()).replace(/,/g, '');
            } catch (e) { return '--:--'; }
        }

        setInterval(() => {
            document.querySelectorAll('.currency-time').forEach(el => {
                const currency = el.getAttribute('data-currency');
                el.innerText = getLocalTime(currency);
            });
        }, 10000);

        async function init() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                const data = await res.json();
                rates = data.usd; 
                
                const updateDate = data.date || "近期更新";
                document.getElementById('meta-info').innerText = `更新于: ${updateDate} · 数据源: fawazahmed0`;

                if(rates['cny']) baseUSDValue = 1000 / rates['cny']; 
                renderCards();
            } catch (err) {
                document.getElementById('status-text').innerText = '数据同步失败';
                document.getElementById('meta-info').innerText = '请检查网络连接后重试';
            }
        }

        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = '';
            
            activeCards.forEach(currency => {
                const rateKey = currency.toLowerCase();
                const rateToUSD = rates[rateKey] || 1;
                const displayValue = (baseUSDValue * rateToUSD).toFixed(2);
                
                const wrapper = document.createElement('div');
                wrapper.className = 'swipe-wrapper';
                wrapper.dataset.currency = currency;
                
                wrapper.innerHTML = `
                    <div class="actions-bg">
                        <button class="action-btn add" onclick="openPicker()">+</button>
                        <button class="action-btn del" onclick="removeCurrency('${currency}')">✕</button>
                    </div>
                    <div class="card-content">
                        <div class="currency-info">
                            <div class="currency-label">${currency}</div>
                            <div class="currency-time" data-currency="${currency}">${getLocalTime(currency)}</div>
                        </div>
                        <div class="input-wrapper">
                            <input type="number" inputmode="decimal" 
                                   data-currency="${currency}" 
                                   value="${displayValue}">
                        </div>
                    </div>
                `;
                
                bindTouchEvents(wrapper);
                container.appendChild(wrapper);
            });

            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', handleInput);
                input.addEventListener('focus', function() { 
                    this.value = ''; 
                    document.querySelectorAll('.card-content').forEach(c => c.style.transform = 'translateX(0)');
                });
                input.addEventListener('blur', function() {
                    if(this.value === '') renderCards();
                });
            });
        }

        function handleInput(e) {
            const currency = e.target.getAttribute('data-currency').toLowerCase();
            const value = parseFloat(e.target.value);
            if (isNaN(value)) return;

            baseUSDValue = value / rates[currency];
            document.querySelectorAll('input').forEach(input => {
                const targetCurrency = input.getAttribute('data-currency').toLowerCase();
                if (targetCurrency !== currency) {
                    input.value = (baseUSDValue * rates[targetCurrency]).toFixed(2);
                }
            });
        }

        function removeCurrency(currency) {
            activeCards = activeCards.filter(c => c !== currency);
            renderCards();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function openPicker() {
            const select = document.getElementById('currency-select');
            select.innerHTML = '';
            let count = 0;
            Object.keys(allCurrencies).forEach(code => {
                if (!activeCards.includes(code)) {
                    select.innerHTML += `<option value="${code}">${code} - ${allCurrencies[code]}</option>`;
                    count++;
                }
            });
            document.querySelectorAll('.card-content').forEach(c => c.style.transform = 'translateX(0)');
            if (count === 0) { alert('已添加所有可用币种'); return; }
            document.getElementById('picker-overlay').style.display = 'flex';
        }

        function addCurrency() {
            const select = document.getElementById('currency-select');
            if(select.value) { activeCards.push(select.value); renderCards(); }
            closeModal('picker-overlay');
        }

        function openSort() {
            renderSortList();
            document.querySelectorAll('.card-content').forEach(c => c.style.transform = 'translateX(0)');
            document.getElementById('sort-overlay').style.display = 'flex';
        }

        function renderSortList() {
            const container = document.getElementById('sort-list');
            container.innerHTML = '';
            activeCards.forEach((currency, index) => {
                container.innerHTML += `
                    <div class="sort-item">
                        <div class="sort-item-label">${currency}</div>
                        <div class="sort-controls">
                            <button onclick="moveItem(${index}, -1)">↑</button>
                            <button onclick="moveItem(${index}, 1)">↓</button>
                        </div>
                    </div>
                `;
            });
        }

        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= activeCards.length) return;
            [activeCards[index], activeCards[newIndex]] = [activeCards[newIndex], activeCards[index]];
            renderSortList(); 
            renderCards();    
        }

        function bindTouchEvents(wrapper) {
            const cardContent = wrapper.querySelector('.card-content');
            let startX = 0, startY = 0;
            let isSwiping = false;

            wrapper.addEventListener('touchstart', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                document.querySelectorAll('.card-content').forEach(c => {
                    if (c !== cardContent) {
                        c.style.transition = 'transform 0.3s ease';
                        c.style.transform = 'translateX(0)';
                    }
                });
            }, { passive: true });

            wrapper.addEventListener('touchmove', (e) => {
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;

                if (!isSwiping && Math.abs(dx) > Math.abs(dy) + 5) {
                    isSwiping = true;
                }

                if (isSwiping) {
                    e.preventDefault(); // 配合外部的 touch-action: pan-y，这里的阻止默认事件会非常稳定
                    let tx = dx;
                    if (tx > 80) tx = 80 + (tx - 80) * 0.2;
                    if (tx < -80) tx = -80 + (tx + 80) * 0.2;
                    
                    cardContent.style.transition = 'none';
                    cardContent.style.transform = `translateX(${tx}px)`;
                }
            }, { passive: false });

            wrapper.addEventListener('touchend', (e) => {
                if (isSwiping) {
                    const dx = e.changedTouches[0].clientX - startX;
                    cardContent.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    
                    if (dx > 50) cardContent.style.transform = `translateX(70px)`; 
                    else if (dx < -50) cardContent.style.transform = `translateX(-70px)`;
                    else cardContent.style.transform = `translateX(0)`;
                    
                    isSwiping = false;
                }
            });
        }

        init();
    </script>
</body>
</html>
