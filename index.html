<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neumorphism Exchange</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23E0E5EC'/><text x='50' y='65' font-size='40' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='%23a3b1c6'>汇</text></svg>">
    
    <style>
        :root {
            --bg: #E0E5EC;
            --text-dark: #4D5E7C;
            --text-light: #9BAAC6;
            --shadow-light: rgba(255,255,255, 0.8);
            --shadow-dark: rgba(163,177,198, 0.6);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        }
        header {
            padding: 30px 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-dark);
        }
        .add-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            color: var(--text-dark);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .add-btn:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }
        .cards-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px 5px 40px;
            margin: 0 -5px; 
            scrollbar-width: none;
        }
        .cards-container::-webkit-scrollbar { display: none; }
        
        .card {
            background: var(--bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 7px 7px 15px var(--shadow-dark), -7px -7px 15px var(--shadow-light);
            display: flex;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease;
        }
        
        /* 货币与时间信息的组合容器 */
        .currency-info {
            display: flex;
            flex-direction: column;
            width: 75px;
        }
        .currency-label {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
        }
        .currency-time {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            flex: 1;
            margin-left: 10px;
            margin-right: 0; 
            border-radius: 12px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        input[type="number"] {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: right;
            outline: none;
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        .delete-btn {
            position: absolute;
            right: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            color: #ff4d4f;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .delete-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        .card.show-delete .delete-btn {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .card.show-delete .input-wrapper {
            margin-right: 45px; 
        }

        .picker-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(224, 229, 236, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .picker-card {
            background: var(--bg);
            border-radius: 24px;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }
        .picker-card select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            font-size: 18px;
            color: var(--text-dark);
            outline: none;
            margin-bottom: 25px;
            appearance: none;
        }
        .picker-btns {
            display: flex;
            justify-content: space-between;
        }
        .picker-btns button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--bg);
            font-size: 16px;
            font-weight: bold;
            color: var(--text-dark);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            margin: 0 8px;
        }
        .picker-btns button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }
        .status {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Exchange & Time</h1>
        <button class="add-btn" onclick="openPicker()">+</button>
    </header>
    
    <div class="cards-container" id="cards">
        </div>
    
    <div class="status" id="status-text">右滑删除卡片 · 左滑添加货币</div>

    <div class="picker-overlay" id="picker">
        <div class="picker-card">
            <select id="currency-select"></select>
            <div class="picker-btns">
                <button onclick="closePicker()">取消</button>
                <button onclick="addCurrency()" style="color: #007aff;">添加</button>
            </div>
        </div>
    </div>

    <script>
        let rates = {};
        let activeCards = ['CNY', 'USD', 'EUR', 'AUD']; 
        let baseUSDValue = 0; 
        
        const allCurrencies = {
            'CNY': '人民币', 'USD': '美元', 'EUR': '欧元', 'JPY': '日元', 
            'GBP': '英镑', 'HKD': '港币', 'TWD': '新台币', 'SGD': '新加坡元',
            'AUD': '澳元', 'CAD': '加币', 'VND': '越南盾', 'THB': '泰铢', 
            'KRW': '韩元', 'PLN': '波兰币', 'CHF': '瑞士法郎', 'NZD': '新西兰元'
        };

        // 为各个货币配置对应的目标时区
        const timeZoneMap = {
            'CNY': 'Asia/Shanghai', 
            'USD': 'America/New_York', 
            'EUR': 'Europe/Berlin',
            'JPY': 'Asia/Tokyo', 
            'GBP': 'Europe/London', 
            'HKD': 'Asia/Hong_Kong',
            'TWD': 'Asia/Taipei', 
            'SGD': 'Asia/Singapore', 
            'AUD': 'Australia/Sydney',
            'CAD': 'America/Toronto', 
            'VND': 'Asia/Ho_Chi_Minh', 
            'THB': 'Asia/Bangkok',
            'KRW': 'Asia/Seoul', 
            'PLN': 'Europe/Warsaw', 
            'CHF': 'Europe/Zurich', 
            'NZD': 'Pacific/Auckland'
        };

        // 获取指定时区的当前时间 (格式 HH:MM)
        function getLocalTime(currency) {
            const tz = timeZoneMap[currency];
            if (!tz) return '--:--';
            return new Intl.DateTimeFormat('zh-CN', { 
                timeZone: tz, 
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: false 
            }).format(new Date());
        }

        // 定时更新时间显示（每 10 秒刷新一次，保证分钟跳转无延迟感）
        setInterval(() => {
            document.querySelectorAll('.currency-time').forEach(el => {
                const currency = el.getAttribute('data-currency');
                el.innerText = getLocalTime(currency);
            });
        }, 10000);

        async function init() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                const data = await res.json();
                rates = data.usd; 
                
                if(rates['cny']) {
                    baseUSDValue = 1000 / rates['cny']; 
                }
                renderCards();
                populateSelect();
            } catch (err) {
                document.getElementById('status-text').innerText = '数据更新失败，请检查网络';
            }
        }

        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = '';
            
            activeCards.forEach(currency => {
                const rateKey = currency.toLowerCase();
                const rateToUSD = rates[rateKey] || 1;
                const displayValue = (baseUSDValue * rateToUSD).toFixed(2);
                const currentTime = getLocalTime(currency);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.currency = currency;
                
                // 将代码和时间包裹在 currency-info 中
                card.innerHTML = `
                    <div class="currency-info">
                        <div class="currency-label">${currency}</div>
                        <div class="currency-time" data-currency="${currency}">${currentTime}</div>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" inputmode="decimal" 
                               data-currency="${currency}" 
                               value="${displayValue}">
                    </div>
                    ${activeCards.length > 2 ? `<button class="delete-btn" onclick="removeCurrency('${currency}')">✕</button>` : ''}
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', handleInput);
                input.addEventListener('focus', function() { 
                    this.value = ''; 
                    this.closest('.card').classList.remove('show-delete');
                });
                input.addEventListener('blur', function() {
                    if(this.value === '') { renderCards(); }
                });
            });
        }

        function handleInput(e) {
            const currency = e.target.getAttribute('data-currency').toLowerCase();
            const value = parseFloat(e.target.value);
            
            if (isNaN(value)) return;

            baseUSDValue = value / rates[currency];

            document.querySelectorAll('input').forEach(input => {
                const targetCurrency = input.getAttribute('data-currency').toLowerCase();
                if (targetCurrency !== currency) {
                    input.value = (baseUSDValue * rates[targetCurrency]).toFixed(2);
                }
            });
        }

        function removeCurrency(currency) {
            activeCards = activeCards.filter(c => c !== currency);
            renderCards();
        }

        function populateSelect() {
            const select = document.getElementById('currency-select');
            select.innerHTML = '';
            Object.keys(allCurrencies).forEach(code => {
                if (!activeCards.includes(code)) {
                    select.innerHTML += `<option value="${code}">${code} - ${allCurrencies[code]}</option>`;
                }
            });
        }

        function openPicker() {
            populateSelect();
            if (document.getElementById('currency-select').options.length === 0) {
                alert('所有币种已添加');
                return;
            }
            document.getElementById('picker').style.display = 'flex';
        }

        function closePicker() {
            document.getElementById('picker').style.display = 'none';
        }

        function addCurrency() {
            const select = document.getElementById('currency-select');
            if(select.value) {
                activeCards.push(select.value);
                renderCards();
            }
            closePicker();
        }

        // 手势交互逻辑
        let startX = 0;
        let startY = 0;
        
        document.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            let endY = e.changedTouches[0].clientY;
            
            if (Math.abs(endX - startX) > Math.abs(endY - startY)) {
                const diff = endX - startX;
                const card = e.target.closest('.card');
                
                if (diff > 50) {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('show-delete'));
                    if (card && activeCards.length > 2) {
                        card.classList.add('show-delete');
                    }
                } 
                else if (diff < -50) {
                    if (card && card.classList.contains('show-delete')) {
                        card.classList.remove('show-delete');
                    } else {
                        openPicker();
                    }
                }
            }
        }, {passive: true});

        init();
    </script>
</body>
</html>
