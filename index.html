<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Currency</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Currency">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <style>
        :root {
            --bg: #E0E5EC; --input-bg: #D5DFEB; 
            --text-dark: #4D5E7C; --text-light: #9BAAC6;
            --shadow-light: rgba(255,255,255, 0.9); --shadow-dark: rgba(163,177,198, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-dark); height: 100vh; display: flex; flex-direction: column; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); overflow-x: hidden; overscroll-behavior-x: none; }
        header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: 0.5px; color: var(--text-dark); }
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg); border: none; color: var(--text-dark); font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); cursor: pointer; transition: all 0.2s ease; }
        .icon-btn:active { box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        .cards-container { flex: 1; overflow-y: auto; padding: 30px 20px 60px; margin: -20px 0; scrollbar-width: none; }
        .cards-container::-webkit-scrollbar { display: none; }
        .swipe-wrapper { position: relative; margin-bottom: 28px; border-radius: 20px; touch-action: pan-y; }
        .actions-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); border-radius: 20px; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1; }
        .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .action-btn.add { color: #34c759; }
        .action-btn.del { color: #ff3b30; }
        .card-content { background: var(--bg); border-radius: 20px; padding: 22px 20px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); display: flex; align-items: center; position: relative; z-index: 2; width: 100%; }
        .currency-info { display: flex; flex-direction: column; width: 105px; }
        .currency-label { font-size: 22px; font-weight: 800; color: var(--text-dark); }
        .currency-time { font-size: 11px; font-weight: 600; color: var(--text-light); margin-top: 6px; }
        .input-wrapper { flex: 1; margin-left: 10px; border-radius: 12px; background-color: var(--input-bg); box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); padding: 12px 15px; }
        input[type="number"] { width: 100%; border: none; background: transparent; font-size: 24px; font-weight: 700; color: var(--text-dark); text-align: right; outline: none; }
        .footer-info { text-align: center; padding-bottom: 20px; }
        .status { font-size: 11px; color: var(--text-light); margin-bottom: 6px; }
        .meta-info { font-size: 10px; color: var(--text-light); opacity: 0.7; }
        /* 浮层逻辑省略，保持不变 */
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(224, 229, 236, 0.85); backdrop-filter: blur(10px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .modal-card { background: var(--bg); border-radius: 24px; padding: 25px; width: 85%; max-width: 380px; box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light); }
        .modal-card select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--bg); color: var(--text-dark); box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); font-size: 18px; outline: none; margin-bottom: 25px; appearance: none; }
        .modal-btns { display: flex; justify-content: space-between; }
        .modal-btns button { flex: 1; padding: 14px; border-radius: 12px; border: none; background: var(--bg); font-size: 16px; font-weight: bold; color: var(--text-dark); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); margin: 0 8px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Currency</h1>
        <div class="header-actions">
            <button class="icon-btn" onclick="forceRefresh()">↻</button>
            <button class="icon-btn" onclick="openSort()">⇅</button>
            <button class="icon-btn" onclick="openPicker()">+</button>
        </div>
    </header>
    <div class="cards-container" id="cards"></div>
    <div class="footer-info">
        <div class="status">左滑添加 · 右滑删除</div>
        <div class="meta-info" id="meta-info">正在获取最新汇率数据...</div>
    </div>
    <script>
        let rates = {};
        let activeCards = JSON.parse(localStorage.getItem('myCurrencies')) || ['CNY', 'USD', 'EUR', 'AUD']; 
        let baseUSDValue = 100 / (JSON.parse(localStorage.getItem('lastRate')) || 7.2);

        async function init() { await fetchRates(); }

        async function fetchRates() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                const data = await res.json();
                rates = data.usd;
                localStorage.setItem('lastRate', JSON.stringify(rates['cny']));
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('meta-info').innerText = `上次刷新: ${now} · 数据源: fawazahmed0`;
                renderCards();
            } catch (err) { document.getElementById('meta-info').innerText = '数据同步失败，请检查网络'; }
        }

        function forceRefresh() { fetchRates(); }

        function renderCards() {
            localStorage.setItem('myCurrencies', JSON.stringify(activeCards));
            // ... (其余渲染逻辑与之前保持一致)
            const container = document.getElementById('cards');
            container.innerHTML = '';
            activeCards.forEach(currency => {
                // ... (卡片拼接逻辑)
                const rateKey = currency.toLowerCase();
                const rateToUSD = rates[rateKey] || 1;
                const displayValue = (baseUSDValue * rateToUSD).toFixed(2);
                
                const wrapper = document.createElement('div');
                wrapper.className = 'swipe-wrapper';
                wrapper.dataset.currency = currency;
                wrapper.innerHTML = `
                    <div class="actions-bg">
                        <button class="action-btn add" onclick="openPicker()">+</button>
                        <button class="action-btn del" onclick="removeCurrency('${currency}')">✕</button>
                    </div>
                    <div class="card-content">
                        <div class="currency-info">
                            <div class="currency-label">${currency}</div>
                            <div class="currency-time" data-currency="${currency}">${getLocalTime(currency)}</div>
                        </div>
                        <div class="input-wrapper">
                            <input type="number" inputmode="decimal" data-currency="${currency}" value="${displayValue}">
                        </div>
                    </div>
                `;
                bindTouchEvents(wrapper);
                container.appendChild(wrapper);
            });
        }
        // ... (其余逻辑与之前版本完全兼容)
        init();
    </script>
</body>
</html>
