<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neumorphism Exchange</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23E0E5EC'/><text x='50' y='65' font-size='40' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='%23a3b1c6'>汇</text></svg>">
    
    <style>
        :root {
            --bg: #E0E5EC;
            --text-dark: #4D5E7C;
            --text-light: #9BAAC6;
            --shadow-light: rgba(255,255,255, 0.7);
            --shadow-dark: rgba(163,177,198, 0.6);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        }
        header {
            padding: 30px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-dark);
        }
        .add-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            color: var(--text-dark);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .add-btn:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }
        .cards-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0 40px;
            scrollbar-width: none;
        }
        .cards-container::-webkit-scrollbar { display: none; }
        
        .card {
            background: var(--bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 7px 7px 15px var(--shadow-dark), -7px -7px 15px var(--shadow-light);
            display: flex;
            align-items: center;
            position: relative;
        }
        .currency-label {
            font-size: 20px;
            font-weight: 800;
            width: 70px;
            color: var(--text-dark);
        }
        .input-wrapper {
            flex: 1;
            margin-left: 15px;
            margin-right: 35px;
            border-radius: 12px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            padding: 12px 15px;
        }
        input[type="number"] {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: right;
            outline: none;
        }
        /* 隐藏原生数字输入框的加减箭头 */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .delete-btn {
            position: absolute;
            right: 20px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            color: #ff4d4f;
            font-weight: bold;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .delete-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        /* 添加货币的选择器层 */
        .picker-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(224, 229, 236, 0.9);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .picker-card {
            background: var(--bg);
            border-radius: 24px;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }
        .picker-card select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            font-size: 18px;
            color: var(--text-dark);
            outline: none;
            margin-bottom: 20px;
            appearance: none;
        }
        .picker-btns {
            display: flex;
            justify-content: space-between;
        }
        .picker-btns button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--bg);
            font-size: 16px;
            font-weight: bold;
            color: var(--text-dark);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            margin: 0 5px;
        }
        .picker-btns button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }
        .status {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Exchange</h1>
        <button class="add-btn" onclick="openPicker()">+</button>
    </header>
    
    <div class="cards-container" id="cards">
        </div>
    
    <div class="status" id="status-text">正在更新汇率...</div>

    <div class="picker-overlay" id="picker">
        <div class="picker-card">
            <select id="currency-select">
                </select>
            <div class="picker-btns">
                <button onclick="closePicker()">取消</button>
                <button onclick="addCurrency()" style="color: #007aff;">添加</button>
            </div>
        </div>
    </div>

    <script>
        // 核心数据状态
        let rates = {};
        // 默认卡片
        let activeCards = ['CNY', 'USD', 'JPY']; 
        let baseUSDValue = 0; 
        
        const allCurrencies = {
            'CNY': '人民币', 'USD': '美元', 'EUR': '欧元', 'JPY': '日元', 
            'GBP': '英镑', 'HKD': '港币', 'VND': '越南盾', 'THB': '泰铢', 
            'PLN': '波兰币', 'KRW': '韩元'
        };

        // 初始化
        async function init() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                rates = data.rates;
                document.getElementById('status-text').innerText = '数据已同步';
                
                // 赋初值：默认100人民币
                if(rates['CNY']) {
                    baseUSDValue = 100 / rates['CNY'];
                }
                renderCards();
                populateSelect();
            } catch (err) {
                document.getElementById('status-text').innerText = '网络错误，请刷新重试';
            }
        }

        // 渲染卡片界面
        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = '';
            
            activeCards.forEach(currency => {
                const rateToUSD = rates[currency] || 1;
                const displayValue = (baseUSDValue * rateToUSD).toFixed(2);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="currency-label">${currency}</div>
                    <div class="input-wrapper">
                        <input type="number" inputmode="decimal" 
                               data-currency="${currency}" 
                               value="${displayValue}">
                    </div>
                    ${activeCards.length > 2 ? `<button class="delete-btn" onclick="removeCurrency('${currency}')">✕</button>` : ''}
                `;
                container.appendChild(card);
            });

            // 重新绑定输入事件
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', handleInput);
                // 点击输入框时自动清空，方便重新输入
                input.addEventListener('focus', function() { this.value = ''; });
                // 失去焦点且为空时，恢复计算值
                input.addEventListener('blur', function() {
                    if(this.value === '') { renderCards(); }
                });
            });
        }

        // 处理输入联动
        function handleInput(e) {
            const currency = e.target.getAttribute('data-currency');
            const value = parseFloat(e.target.value);
            
            if (isNaN(value)) return;

            // 以当前输入为基准计算美元价值
            baseUSDValue = value / rates[currency];

            // 更新其他所有输入框
            document.querySelectorAll('input').forEach(input => {
                const targetCurrency = input.getAttribute('data-currency');
                if (targetCurrency !== currency) {
                    input.value = (baseUSDValue * rates[targetCurrency]).toFixed(2);
                }
            });
        }

        // 移除卡片
        function removeCurrency(currency) {
            activeCards = activeCards.filter(c => c !== currency);
            renderCards();
        }

        // 填充下拉菜单
        function populateSelect() {
            const select = document.getElementById('currency-select');
            select.innerHTML = '';
            Object.keys(allCurrencies).forEach(code => {
                if (!activeCards.includes(code)) {
                    select.innerHTML += `<option value="${code}">${code} - ${allCurrencies[code]}</option>`;
                }
            });
        }

        function openPicker() {
            populateSelect();
            const select = document.getElementById('currency-select');
            if (select.options.length === 0) {
                alert('所有币种已添加');
                return;
            }
            document.getElementById('picker').style.display = 'flex';
        }

        function closePicker() {
            document.getElementById('picker').style.display = 'none';
        }

        function addCurrency() {
            const select = document.getElementById('currency-select');
            if(select.value) {
                activeCards.push(select.value);
                renderCards();
            }
            closePicker();
        }

        // 启动
        init();
    </script>
</body>
</html>
